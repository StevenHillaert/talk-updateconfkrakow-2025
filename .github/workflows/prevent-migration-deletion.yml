name: Prevent Migration Deletion
# DEMO: Protect against deletion of migration files in pull requests
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-migration-deletion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for deleted migration files
        run: |
          deleted=$(git diff --name-status origin/${{ github.base_ref }}...${{ github.head_ref }} | grep '^D' | grep 'src/Bookify.Infrastructure/Migrations/.*\.cs' || true)
          if [ -n "$deleted" ]; then
            echo "Error: Migration files deleted in this PR:"
            echo "$deleted"
            exit 1
          fi