name: Prevent Migration Deletion
# DEMO: 5a pipelines : Protect against deletion of migration files in pull requests and pushes
on:
  push:
    branches:
      - '**'
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-migration-deletion:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history so we can diff

      - name: Fetch all branches
        run: git fetch --all

      - name: Check for deleted migration files
        run: |
          deleted=$(git diff --name-status origin/${{ github.base_ref }}...${{ github.head_ref }} | grep '^D' | grep 'src/Bookify.Infrastructure/Migrations/.*\.cs' || true)
          if [ -n "$deleted" ]; then
            echo "Error: Migration files deleted in this PR:"
            echo "$deleted"
            exit 1
          fi